[cmd_duration]
min_time = 500
format = 'took [$duration](bold yellow)'

[directory]
format = "[$path]($style)"
style = "bold cyan"
home_symbol = "~"
truncation_length = 7
truncation_symbol = ".../"
truncate_to_repo = false
use_os_path_sep = true

